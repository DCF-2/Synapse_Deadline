# ==========================================
# PERFIL DE PRODUÇÃO (application-prod.properties)
# ==========================================

# A URL, Usuário e Senha virão das variáveis de ambiente do Render
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Como é produção, o Hibernate vai apenas atualizar as tabelas, não recriá-las do zero
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Desliga o log SQL para não poluir o terminal e economizar processamento
spring.jpa.show-sql=false

# A chave secreta do JWT deve ser obrigatoriamente definida na variável de ambiente JWT_SECRET no Render
api.security.token.secret=${JWT_SECRET}

# ==========================================
# CONFIGURAÇÃO DE CORS
# ==========================================
# Em dev, o frontend geralmente roda na porta 5173 (Vite/React) ou 3000 (Next)
cors.allowed.origins=http://localhost:5173,https://synapse-deadline.vercel.app