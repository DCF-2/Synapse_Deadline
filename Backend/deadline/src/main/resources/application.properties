# ==========================================
# NOME DA APLICAÇÃO E PORTA
# ==========================================
spring.application.name=deadline
server.port=8080

# ==========================================
# CONFIGURAÇÃO DO BANCO DE DADOS (H2 LOCAL)
# ==========================================
# Permite testarmos localmente gravando num arquivo sem precisar instalar o PostgreSQL agora
spring.datasource.url=jdbc:h2:file:./data/empresa-db;
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# ==========================================
# CONFIGURAÇÕES DO HIBERNATE / JPA
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.open-in-view=false

# ==========================================
# SEGURANÇA (JWT)
# ==========================================
# Puxa da variável do sistema, mas se não achar (como no seu PC), usa um valor padrão
# api.security.token.secret=${JWT_SECRET:senha_falsa_local_apenas_para_desenvolvimento_123}
api.security.token.secret=${JWT_SECRET:chave_aleatoria_de_seguranca}
#api.security.token.secret=${JWT_SECRET}

# ==========================================
# CONFIGURAÇÃO DE CORS
# ==========================================
# Em dev, o frontend geralmente roda na porta 5173 (Vite/React) ou 3000 (Next)
cors.allowed.origins=http://localhost:5173,https://synapse-deadline.vercel.app