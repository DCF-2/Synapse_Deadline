# ==========================================
# NOME DA APLICAÇÃO E PORTA
# ==========================================
spring.application.name=deadline
server.port=8080

# ==========================================
# CONFIGURAÇÃO DO BANCO DE DADOS (H2 LOCAL)
# ==========================================
# Permite testarmos localmente gravando num arquivo sem precisar instalar o PostgreSQL agora
# AUTO_SERVER=true ajuda a evitar bloqueios do arquivo em reinícios rápidos do backend
spring.datasource.url=jdbc:h2:file:./data/empresa-db;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# ==========================================
# CONFIGURAÇÕES DO HIBERNATE / JPA
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# SEGURANÇA (JWT)
# ==========================================
# Puxa do .env / variável de ambiente; em dev usa fallback se não estiver definido
api.security.token.secret=${JWT_SECRET:dev_secret_local_apenas_nao_usar_em_producao_1234567890}

# ==========================================
# CONFIGURAÇÃO DE CORS
# ==========================================
# Em dev, o frontend geralmente roda na porta 5173 (Vite/React) ou 3000 (Next)
cors.allowed.origins=http://localhost:5173,https://synapse-deadline.vercel.app

# ==========================================
# GOOGLE MAPS (Geocodificação de endereços)
# ==========================================
# Configure GOOGLE_MAPS_API_KEY no .env (ver .env.example)
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}