# ==========================================
# BANCO DE DADOS EM MEMÓRIA PARA TESTES
# ==========================================
# O "mem:testdb" diz que o banco vive na memória RAM e o DB_CLOSE_DELAY impede que ele feche antes da hora
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# O Hibernate vai criar as tabelas do zero a cada teste e apagar no final
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Chave secreta falsa apenas para os testes passarem
api.security.token.secret=${JWT_SECRET:senha_falsa_local_apenas_para_desenvolvimento_123}

# ==========================================
# CONFIGURAÇÃO DE CORS
# ==========================================
# Em dev, o frontend geralmente roda na porta 5173 (Vite/React) ou 3000 (Next)
cors.allowed.origins=http://localhost:5173,https://synapse-deadline.vercel.app

google.maps.api.key=${GOOGLE_MAPS_API_KEY:chave_falsa_local_apenas_para_desenvolvimento_123}